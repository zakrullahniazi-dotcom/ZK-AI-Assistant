<!DOCTYPE html>
<html lang="ps" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZK AI Assistant</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="topbar">
    <div class="brand">
      <div class="logo">ZK</div>
      <div>
        <h2>ZK AI Assistant</h2>
        <p id="brandText">ستاسو هوښیار AI مرستیال</p>
      </div>
    </div>

    <button id="settingsBtn" onclick="openSettings()">Settings</button>
  </header>

  <!-- Main Content -->
  <main class="main">
    <section class="hero">
      <h1>ZK AI Assistant</h1>
      <p id="subtitle">سلام! زه ستا هوښیار AI مرستیال یم. خپله پوښتنه ولیکه.</p>
    </section>

    <section class="chat-container">
      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input type="text" id="userInput" placeholder="دلته خپله پوښتنه ولیکه...">
        <button id="sendBtn" onclick="sendMessage()">ولېږه</button>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer id="footerText">
    Online AI Assistant · ZK AI
  </footer>

  <!-- Settings Overlay -->
  <div class="settings-overlay" id="settingsOverlay" onclick="closeSettings()"></div>

  <!-- Settings Left Side Panel -->
  <aside class="settings-panel" id="settingsPanel">

    <div class="settings-header">
      <h2 id="settingsTitle">Settings</h2>
      <button onclick="closeSettings()">×</button>
    </div>

    <!-- Language -->
    <div class="settings-section">
      <h3 id="languageTitle">Language</h3>
      <button onclick="changeLanguage('ps')">پښتو</button>
      <button onclick="changeLanguage('fa')">دری</button>
      <button onclick="changeLanguage('en')">English</button>
    </div>

    <!-- Appearance -->
    <div class="settings-section">
      <h3 id="appearanceTitle">Appearance</h3>
      <button id="themeBtn" onclick="toggleAppearance()">Dark</button>
    </div>

    <!-- Email Login -->
    <div class="settings-section">
      <h3 id="loginTitle">Login with Email</h3>

      <input type="email" id="emailInput" placeholder="Enter your email">
      <button id="saveEmailBtn" onclick="saveEmail()">Save Email</button>
      <button id="openEmailBtn" onclick="openEmailApp()">Open Email App</button>

      <p id="loginText"></p>
    </div>

    <!-- About -->
    <div class="settings-section">
      <h3 id="aboutTitle">About</h3>

      <div class="about-item" id="helpItem" onclick="showHelpCenter()">Help Center</div>
      <div class="about-item" id="termsItem" onclick="showTerms()">Terms of Use</div>
      <div class="about-item" id="privacyItem" onclick="showPrivacy()">Privacy Policy</div>

      <div class="about-item" id="zkAndroidItem">ZK AI for Android</div>
      <div class="about-version">1.2026.111 (26)</div>

      <button class="zk-service-btn" id="zkServiceBtn" onclick="showZkServices()">
        ZK Services
      </button>

      <div id="aboutInfo" class="about-info"></div>
    </div>

  </aside>

  <script src="app.js"></script>
</body>
</html>
